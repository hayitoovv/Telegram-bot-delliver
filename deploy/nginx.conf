server {
    listen 80;
    server_name 87.192.226.203;

    # Frontend (Mini App)
    location / {
        root /var/www/food-delivery/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API & Admin
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static files
    location /static/ {
        alias /var/www/food-delivery/backend/staticfiles/;
    }

    # Media files (mahsulot rasmlari)
    location /media/ {
        alias /var/www/food-delivery/backend/media/;
    }

    client_max_body_size 10M;
}
